version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: yeniproje-postgres
    environment:
      POSTGRES_DB: yeniproje_db
      POSTGRES_USER: yeniproje_user
      POSTGRES_PASSWORD: yeniproje_pass
    ports:
      - "5433:5432"        # 5432 dolu, 5433 kullan
    volumes:
      - yeniproje_postgres_data:/var/lib/postgresql/data
    networks:
      - yeniproje-network

  redis:
    image: redis:7-alpine
    container_name: yeniproje-redis
    ports:
      - "6380:6379"        # 6379 dolu, 6380 kullan
    networks:
      - yeniproje-network

volumes:
  yeniproje_postgres_data:

networks:
  yeniproje-network:
    driver: bridge
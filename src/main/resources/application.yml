server:
  port: 8082

spring:
  config:
    import: "optional:dotenv:"
  application:
    name: testup-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/testup_db}
    username: ${DB_USERNAME:testup_user}
    password: ${DB_PASSWORD:Tp8xK2mQ5nL9wRv4}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 14
    validate-on-migrate: false
    out-of-order: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

sendpulse:
  client-id: ${SENDPULSE_CLIENT_ID:}
  client-secret: ${SENDPULSE_CLIENT_SECRET:}
  from-email: ${SENDPULSE_FROM_EMAIL:info@testup.az}
  from-name: testup.az

jwt:
  secret: ${JWT_SECRET:dGVzdHVwLWF6LXN1cGVyLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbg==}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:86400000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:2592000000}

groq:
  api-key: ${GROQ_API_KEY:}

google:
  client-id: ${GOOGLE_CLIENT_ID:}

kapitalbank:
  username: ${KAPITALBANK_USERNAME:}
  password: ${KAPITALBANK_PASSWORD:}
  production: ${KAPITALBANK_PRODUCTION:false}

app:
  base-url: ${APP_BASE_URL:http://localhost:5173}

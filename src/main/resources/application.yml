server:
  port: 8080

spring:
  application:
    name: testup-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/testup_db
    username: testup_user
    password: testup_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: dGVzdHVwLWF6LXN1cGVyLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9uLTIwMjQ=
  access-token-expiration: 900000      # 15 minutes
  refresh-token-expiration: 604800000  # 7 days

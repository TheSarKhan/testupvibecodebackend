server:
  port: 8081               # 8080 dolu, 8081 kullan

spring:
  application:
    name: yeniproje-backend

  datasource:
    url: jdbc:postgresql://localhost:5433/yeniproje_db
    username: yeniproje_user
    password: yeniproje_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6380             # 6379 dolu, 6380 kullan

jwt:
  secret: BURAYA_YENI_SECRET_KOY
  access-token-expiration: 86400000
  refresh-token-expiration: 2592000000
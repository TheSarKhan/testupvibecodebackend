server:
  port: 8082

spring:
  application:
    name: testup-backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6380
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

sendpulse:
  client-id: ${SENDPULSE_CLIENT_ID}
  client-secret: ${SENDPULSE_CLIENT_SECRET}
  from-email: ${SENDPULSE_FROM_EMAIL}
  from-name: testup.az

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 86400000
  refresh-token-expiration: 2592000000

groq:
  api-key: ${GROQ_API_KEY}

google:
  client-id: ${GOOGLE_CLIENT_ID}

payriff:
  secret-key: ${PAYRIFF_SECRET_KEY}

app:
  base-url: ${APP_BASE_URL:https://testup.az}
